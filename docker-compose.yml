services:
  mysql:
    image: mysql:8.4
    container_name: ati-mysql
    restart: unless-stopped
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: ati_db
    ports:
      - "3306:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - ati-mysql-data:/var/lib/mysql
    healthcheck:
      test:
        - CMD-SHELL
        - mysqladmin ping -uroot --silent
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  backend:
    build:
      context: .
      dockerfile: docker/backend-apache/Dockerfile
    container_name: ati-backend
    restart: unless-stopped
    network_mode: host
    environment:
      ATI_ENV: development
      JWT_SECRET: ati_super_secret_key_change_in_production_32c

volumes:
  ati-mysql-data:
