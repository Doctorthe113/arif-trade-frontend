version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: ati-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ''
      MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
      MYSQL_DATABASE: ati_db
    ports:
      - '127.0.0.1:3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
      - ./arif_trade_international/restAPI/sql:/docker-entrypoint-initdb.d:ro
    networks:
      - ati-network
    command: --default-authentication-plugin=mysql_native_password

volumes:
  mysql_data:

networks:
  ati-network:
