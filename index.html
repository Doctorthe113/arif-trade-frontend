<!doctype html>
<html lang="en">
  <head>
    <script type="module">
      if (import.meta.env.DEV) {
        import("react-grab");
      }
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Arif Trade International — Medical & Surgical Inventory Management" />
    <meta name="darkreader-lock">
    <title>ATI Control Center</title>
    <script>
      (() => {
        try {
          const stored = window.localStorage.getItem('theme');
          const mode =
            stored === 'light' || stored === 'dark' || stored === 'auto'
              ? stored
              : 'auto';
          const prefersDark = window.matchMedia(
            '(prefers-color-scheme: dark)',
          ).matches;
          const resolved =
            mode === 'auto' ? (prefersDark ? 'dark' : 'light') : mode;
          const root = document.documentElement;
          root.classList.remove('light', 'dark');
          root.classList.add(resolved);
          if (mode === 'auto') {
            root.removeAttribute('data-theme');
          } else {
            root.setAttribute('data-theme', mode);
          }
          root.style.colorScheme = resolved;
        } catch (_e) {
          // ignore
        }
      })();
    </script>
  </head>
  <body class="font-sans antialiased wrap-anywhere selection:bg-accent selection:text-accent-foreground">
    <div id="app"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
