<!doctype html>
<html lang="en">
  <head>
    <script type="module">
      if (import.meta.env.DEV) {
        import("react-grab");
      }
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Arif Trade International — Medical & Surgical Inventory Management" />
    <meta name="darkreader-lock">
    <title>ATI Control Center</title>
    <script>
      (()=> {try{var stored=window.localStorage.getItem('theme');var mode=(stored==='light'||stored==='dark'||stored==='auto')?stored:'auto';var prefersDark=window.matchMedia('(prefers-color-scheme: dark)').matches;var resolved=mode==='auto'?(prefersDark?'dark':'light'):mode;var root=document.documentElement;root.classList.remove('light','dark');root.classList.add(resolved);if(mode==='auto'){root.removeAttribute('data-theme')}else{root.setAttribute('data-theme',mode)}root.style.colorScheme=resolved;}catch(e){}})();
    </script>
  </head>
  <body class="font-sans antialiased [overflow-wrap:anywhere] selection:bg-accent selection:text-accent-foreground">
    <div id="app"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
